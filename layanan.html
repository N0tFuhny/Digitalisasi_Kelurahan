<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Administrasi</title>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kedebideri:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        /* Additional styles specifically for layanan cards if not in style.css */
        .layanan-section {
            padding: 8rem 7% 1.4rem;
            text-align: center;
        }

        .layanan-section h2 {
            font-size: 2.6rem;
            color: #444;
            margin-bottom: 3rem;
            text-transform: uppercase;
        }

        .layanan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .layanan-card {
            background: var(--bg);
            border: 1px solid #666;
            border-radius: 8px;
            padding: 2rem;
            text-align: left;
            transition: all 0.3s ease;
        }

        .layanan-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .layanan-card i {
            color: var(--primary);
            width: 32px;
            height: 32px;
            margin-bottom: 1rem;
        }

        .layanan-card h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #444;
        }

        .layanan-card p {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .layanan-card ul {
            list-style: none;
            padding-left: 0;
        }

        .layanan-card ul li {
            font-size: 1rem;
            color: var(--text-dark);
            display: flex;
            align-items: start;
            margin-bottom: 0.5rem;
        }

        .layanan-card ul li::before {
            content: "✓";
            color: var(--primary);
            margin-right: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- navbar start -->
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">
            <img src="" alt="logo">
            <span>Template Kelurahan</span>
        </a>

        <div class="navbar-nav">
            <a href="index.html">Beranda</a>
            <a href="informasi.html">Informasi</a>
            <a href="layanan.html">Layanan</a>
            <a href="login.html" id="loginLink">Masuk</a>
        </div>
    </nav>

    <section class="layanan-section">
        <h2>Layanan Administrasi Citizen</h2>
        <div class="layanan-grid" id="layananGrid">
            <!-- Diisi oleh javascript config.js -->
        </div>
    </section>

    <!-- footer star -->
    <footer>
        <div class="links">
            <a href="index.html">Beranda</a>
            <a href="informasi.html">Informasi</a>
            <a href="layanan.html">Layanan</a>
        </div>
        <div class="credit">
            <p>created by <a href="">. |&Fuhny</a>. | &copy; 2025.</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
    <script>
        feather.replace()

        // Render layanan list from config
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("layananGrid");
            if (KELURAHAN_CONFIG && KELURAHAN_CONFIG.layanan) {
                grid.innerHTML = KELURAHAN_CONFIG.layanan.map(l => `
        <div class="layanan-card">
          <i data-feather="${l.icon}"></i>
          <h3>${l.judul}</h3>
          <p>${l.deskripsi}</p>
          <h4><strong>Persyaratan:</strong></h4>
          <ul>
            ${l.syarat.map(s => `<li>${s}</li>`).join('')}
          </ul>
        </div>
      `).join('');
                feather.replace();
            }
        });
    </script>
</body>

</html>

    <script src="js/config.js"></script>
    <script src="js/script.js"></script>
    <script>

        // Render layanan list from config
        document.addEventListener("DOMContentLoaded", () => {
            const grid = document.getElementById("layananGrid");
            if (KELURAHAN_CONFIG && KELURAHAN_CONFIG.layanan) {
                grid.innerHTML = KELURAHAN_CONFIG.layanan.map(l => `
        <div class="layanan-card">
          <i data-feather="${l.icon}"></i>
          <h3>${l.judul}</h3>
          <p>${l.deskripsi}</p>
          <h4><strong>Persyaratan:</strong></h4>
          <ul>
            ${l.syarat.map(s => `<li>${s}</li>`).join('')}
          </ul>
        </div>
      `).join('');
                feather.replace();
            }
        });
    </script>

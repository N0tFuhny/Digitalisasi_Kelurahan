  <nav class="navbar">
    <a href="index.html" class="navbar-logo">
      <img src="" alt="logo">

  <section class="info-container">

    <!-- SEARCH -->
    <div class="info-search">
      <input id="searchInput" type="text" placeholder="Cari kegiatan..." onkeyup="applyFilters()">
    </div>

    <!-- FILTER & SORT -->
    <div class="filter-group">
      <select id="sortSelect" onchange="applyFilters()">
        <option value="newest">Terbaru</option>
        <option value="oldest">Terlama</option>
      </select>

      <input type="date" id="filterDate" onchange="applyFilters()">

      <input type="text" id="filterLocation" placeholder="Filter lokasi" onkeyup="applyFilters()">
    </div>



    <!-- GRID -->
    <div id="infoGrid" class="info-grid"></div>

  </section>

  <!-- footer -->
